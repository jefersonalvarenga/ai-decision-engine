name: SDR Agent CI

on:
  push:
    branches: [main, "feature/**", "gatekeeper-mvp", "closer-mvp"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      agent:
        description: "Agente para gerar cenários (gatekeeper ou closer)"
        required: false
        default: "gatekeeper"
      count:
        description: "Número de cenários a gerar"
        required: false
        default: "10"

# ============================================================================
# MODEL CONFIGURATION
# Troque os modelos aqui sem tocar no código.
#
# Tarefas simples (rodar testes, formatar resultado):
#   - anthropic: claude-haiku-4-5   → rápido, barato
#   - glm:       glm-4.7            → gratuito, suficiente para análise básica
#
# Tarefas complexas (analisar falhas, sugerir fix, gerar cenários):
#   - anthropic: claude-opus-4-5    → melhor raciocínio
#   - glm:       glm-5              → melhor do ZhipuAI
# ============================================================================
env:
  # Provider: "anthropic" ou "glm"
  AI_PROVIDER: "glm"

  # Modelos por complexidade
  AI_MODEL_FAST: "glm-4.7"              # análise simples, comentários de PR (gratuito)
  AI_MODEL_SMART: "glm-5"              # análise de falhas, geração de cenários

  # Thresholds
  MIN_PASS_RATE: "90"                    # % mínima para não bloquear merge
  WARN_PASS_RATE: "95"                   # % abaixo da qual posta aviso no PR

jobs:
  # ============================================================================
  # JOB 1: Testes do Gatekeeper
  # ============================================================================
  test-gatekeeper:
    name: "🛡️ Gatekeeper Tests"
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Gatekeeper tests
        id: run_tests
        env:
          DSPY_PROVIDER: ${{ secrets.DSPY_PROVIDER }}
          DSPY_MODEL: ${{ secrets.DSPY_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
        run: |
          python -m app.agents.sdr.test_sdr_agents --gatekeeper 2>&1 | tee test_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Parse test results
        id: parse_results
        run: |
          python scripts/parse_test_results.py test_output.txt >> $GITHUB_OUTPUT

      - name: Upload test log
        uses: actions/upload-artifact@v4
        with:
          name: gatekeeper-test-log
          path: |
            test_output.txt
            app/agents/sdr/logs/*.log
          retention-days: 30

      - name: Analyze failures with AI
        if: steps.parse_results.outputs.failed_count != '0'
        env:
          AI_PROVIDER: ${{ env.AI_PROVIDER }}
          AI_MODEL: ${{ env.AI_MODEL_SMART }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          FAILED_SCENARIOS: ${{ steps.parse_results.outputs.failed_scenarios }}
          PASS_RATE: ${{ steps.parse_results.outputs.pass_rate }}
        run: |
          python scripts/analyze_failures.py \
            --agent gatekeeper \
            --test-log test_output.txt \
            --output analysis.md

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const passRate = '${{ steps.parse_results.outputs.pass_rate }}';
            const passed = '${{ steps.parse_results.outputs.passed_count }}';
            const failed = '${{ steps.parse_results.outputs.failed_count }}';
            const total = '${{ steps.parse_results.outputs.total_count }}';
            const minRate = parseInt('${{ env.MIN_PASS_RATE }}');
            const warnRate = parseInt('${{ env.WARN_PASS_RATE }}');
            const rate = parseFloat(passRate);

            let emoji = '✅';
            let status = 'Aprovado';
            if (rate < minRate) { emoji = '❌'; status = 'Bloqueado'; }
            else if (rate < warnRate) { emoji = '⚠️'; status = 'Atenção'; }

            let body = `## ${emoji} Gatekeeper Tests — ${status}\n\n`;
            body += `| Passed | Failed | Total | Taxa |\n`;
            body += `|--------|--------|-------|------|\n`;
            body += `| ${passed} | ${failed} | ${total} | **${passRate}%** |\n\n`;

            // Adiciona análise de IA se existir
            if (fs.existsSync('analysis.md')) {
              body += `### 🤖 Análise de Falhas (${process.env.AI_MODEL_SMART})\n\n`;
              body += fs.readFileSync('analysis.md', 'utf8');
            }

            body += `\n---\n_Modelo de teste: \`${{ secrets.DSPY_MODEL }}\` | `;
            body += `Análise: \`${{ env.AI_MODEL_SMART }}\`_`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if below minimum pass rate
        if: steps.parse_results.outputs.pass_rate != ''
        run: |
          RATE=${{ steps.parse_results.outputs.pass_rate }}
          MIN=${{ env.MIN_PASS_RATE }}
          echo "Taxa de aprovação: ${RATE}% (mínimo: ${MIN}%)"
          if (( $(echo "$RATE < $MIN" | bc -l) )); then
            echo "❌ Taxa abaixo do mínimo permitido para merge!"
            exit 1
          fi

  # ============================================================================
  # JOB 2: Avaliação multi-turno com ReceptionistSimulator
  # Roda Sofia (GatekeeperAgent) contra 6 cenários simulados de recepcionista.
  # Detecta insistência excessiva (BLOCKED_RISK) e score abaixo do threshold.
  # ============================================================================
  eval-conversations:
    name: "🎭 Conversation Eval (Sofia × Receptionist)"
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run conversation evaluation
        id: eval
        env:
          # Usa GLM para ambos os agentes (Sofia + ReceptionistSimulator) no eval.
          # Motivo: o plano OpenAI free tier tem 30k TPM — insuficiente para
          # 6 conversas × ~5 turnos × 2 LLM calls cada (≈60 calls / run).
          # GLM não tem rate limit rígido de TPM e é gratuito, preservando
          # os créditos OpenAI para o job test-gatekeeper (cenários unitários).
          DSPY_PROVIDER: "glm"
          DSPY_MODEL: "glm-4.7"
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
        run: |
          python scripts/eval_conversations.py \
            --runs 1 \
            --output-json eval_results.json \
            --output-md eval_report.md
          echo "eval_exit=$?" >> $GITHUB_OUTPUT

      - name: Upload evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conversation-eval-report
          path: |
            eval_results.json
            eval_report.md
          retention-days: 30

      - name: Analyze low-score scenarios with AI
        if: always() && steps.eval.outputs.avg_score != '' && steps.eval.outputs.blocking_risk_count != '0' || steps.eval.outputs.pass_rate < env.WARN_PASS_RATE
        env:
          AI_PROVIDER: ${{ env.AI_PROVIDER }}
          AI_MODEL: ${{ env.AI_MODEL_SMART }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
        run: |
          if [ -f eval_report.md ]; then
            python scripts/analyze_failures.py \
              --agent gatekeeper \
              --test-log eval_report.md \
              --output eval_analysis.md || true
          fi

      - name: Comment PR with conversation eval results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const avgScore = parseFloat('${{ steps.eval.outputs.avg_score }}' || '0');
            const passRate = parseFloat('${{ steps.eval.outputs.pass_rate }}' || '0');
            const blocking = parseInt('${{ steps.eval.outputs.blocking_risk_count }}' || '0');
            const avgTurns = '${{ steps.eval.outputs.avg_agent_turns }}' || '?';
            const total = '${{ steps.eval.outputs.total_conversations }}' || '?';
            const minRate = parseFloat('${{ env.MIN_PASS_RATE }}');
            const warnRate = parseFloat('${{ env.WARN_PASS_RATE }}');

            let emoji = '✅';
            let status = 'Aprovado';
            if (blocking > 0) { emoji = '🚨'; status = 'BLOQUEIO DETECTADO'; }
            else if (avgScore < minRate / 100) { emoji = '❌'; status = 'Reprovado'; }
            else if (avgScore < warnRate / 100) { emoji = '⚠️'; status = 'Atenção'; }

            let body = `## ${emoji} Eval Conversas (Sofia × Recepcionista) — ${status}\n\n`;
            body += `| Métrica | Valor |\n`;
            body += `|---------|-------|\n`;
            body += `| Score médio | **${avgScore.toFixed(3)}** |\n`;
            body += `| Taxa aprovação (≥0.70) | **${passRate.toFixed(1)}%** |\n`;
            body += `| Turnos médios Sofia | ${avgTurns} |\n`;
            body += `| BLOCKED_RISK | ${blocking > 0 ? '🚨 **' + blocking + '** — Sofia está insistente!' : '✅ 0'} |\n`;
            body += `| Total conversas | ${total} |\n\n`;

            if (blocking > 0) {
              body += `> ⚠️ **Ação necessária:** BLOCKED_RISK detectado. Sofia está ultrapassando o limite de objeções.\n`;
              body += `> Verifique \`MAX_OBJECTION_TURNS\` em \`agent.py\` e os padrões em \`IMMEDIATE_REJECTION_PATTERNS\`.\n\n`;
            }

            if (fs.existsSync('eval_report.md')) {
              const report = fs.readFileSync('eval_report.md', 'utf8');
              // Include the scenario score table (lines between "Score Médio por Cenário" and next "###")
              const tableMatch = report.match(/### 🗂️ Score Médio por Cenário\n\n([\s\S]*?)(?=\n###)/);
              if (tableMatch) {
                body += `### 🗂️ Score por Cenário\n\n${tableMatch[1]}\n`;
              }
            }

            if (fs.existsSync('eval_analysis.md')) {
              body += `### 🤖 Análise AI (${process.env.AI_MODEL_SMART || 'AI'})\n\n`;
              body += fs.readFileSync('eval_analysis.md', 'utf8');
              body += '\n';
            }

            body += `\n---\n_Ver detalhes completos no artifact \`conversation-eval-report\` deste run._`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if blocking risk detected
        if: steps.eval.outputs.blocking_risk_count != '0' && steps.eval.outputs.blocking_risk_count != ''
        run: |
          echo "🚨 BLOCKED_RISK detectado: ${{ steps.eval.outputs.blocking_risk_count }} conversa(s)"
          echo "Sofia está sendo insistente — risco real de bloqueio no WhatsApp!"
          exit 1

      - name: Fail if avg score below minimum
        if: steps.eval.outputs.avg_score != ''
        run: |
          AVG=${{ steps.eval.outputs.avg_score }}
          MIN=${{ env.MIN_PASS_RATE }}
          # Convert MIN from percentage (e.g. 90) to decimal (0.90) for comparison
          MIN_DECIMAL=$(echo "scale=2; $MIN / 100" | bc)
          echo "Score médio: ${AVG} (mínimo convertido: ${MIN_DECIMAL})"
          if (( $(echo "$AVG < $MIN_DECIMAL" | bc -l) )); then
            echo "❌ Score médio abaixo do mínimo!"
            exit 1
          fi

  # ============================================================================
  # JOB 3: Geração de novos cenários (semanal ou manual)
  # Chame manualmente: Actions → "SDR Agent CI" → "Run workflow"
  # ============================================================================
  generate-scenarios:
    name: "🧠 Generate Test Scenarios"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate new scenarios with AI
        env:
          AI_PROVIDER: ${{ env.AI_PROVIDER }}
          AI_MODEL: ${{ env.AI_MODEL_SMART }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          AGENT: ${{ github.event.inputs.agent || 'gatekeeper' }}
        run: |
          python scripts/generate_scenarios.py \
            --agent $AGENT \
            --count ${{ github.event.inputs.count || '10' }} \
            --output-file app/agents/sdr/test_${AGENT}_cases_new.json

      - name: Open PR with new scenarios
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add AI-generated test scenarios for ${{ github.event.inputs.agent || 'gatekeeper' }}"
          title: "🤖 New test scenarios — ${{ github.event.inputs.agent || 'gatekeeper' }} (${{ env.AI_MODEL_SMART }})"
          body: |
            ## Novos cenários gerados automaticamente

            - **Agente:** `${{ github.event.inputs.agent || 'gatekeeper' }}`
            - **Modelo usado:** `${{ env.AI_MODEL_SMART }}`
            - **Quantidade:** `${{ github.event.inputs.count || '10' }}`

            Revise os cenários antes de mergear. Eles foram gerados com base
            nos cenários existentes e nas lacunas identificadas na cobertura atual.
          branch: "feat/ai-scenarios-${{ github.run_number }}"
          base: main

